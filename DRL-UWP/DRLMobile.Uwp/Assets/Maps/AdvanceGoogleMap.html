<!DOCTYPE html>
<html>
<head>
    <title>Google Maps - Advanced View</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="../../Scripts/AdvanceGoogleMap.js"></script>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            var message = 'Error: ' + msg + ' | Line: ' + line;
            if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
                window.chrome.webview.postMessage(JSON.stringify({ type: 'error', message: message }));
            }
            var errDiv = document.getElementById('error');
            if (errDiv) {
                errDiv.innerHTML += message + '<br>';
                errDiv.style.display = 'block';
            }
            return false;
        };
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #error {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,0,0,0.85);
            color: white;
            padding: 10px;
            z-index: 9999;
            font-family: monospace;
            font-size: 12px;
            max-width: 90%;
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            z-index: 9998;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="error"></div>
    <div id="status">Loading Advanced Map...</div>
    <script>
        var statusDiv = document.getElementById('status');
        
        window.onload = function() {
            if (typeof google === 'undefined') {
                statusDiv.innerHTML = 'FAIL: google object not found';
                statusDiv.style.background = 'rgba(255,0,0,0.8)';
                return;
            }
            statusDiv.innerHTML = 'Map Ready';
            statusDiv.style.background = 'rgba(0,128,0,0.8)';
            setTimeout(function() {
                statusDiv.style.display = 'none';
            }, 1000);
        };
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDJeUyPCwkMaFph6tfAm-kmfdFaYFQVlrI&callback=initMap&libraries=marker&loading=async" async defer></script>
</body>
</html>
