<!DOCTYPE html>
<html>
<head>
    <title>Azure Maps - POC (Browser Test)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css" type="text/css" />
    <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js"></script>
    <script src="POCAzureMapPageTest.js"></script>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            var message = 'Error: ' + msg + ' | Line: ' + line;
            console.error("Window Error Handled: ", message, msg, url, line, col, error);
            if (window.chrome && window.chrome.webview && window.chrome.webview.postMessage) {
                window.chrome.webview.postMessage(message);
            } else if (window.external && window.external.notify) {
                window.external.notify(message);
            }
            var errDiv = document.getElementById('error');
            if (errDiv) {
                errDiv.innerHTML += message + '<br>';
                errDiv.style.display = 'block';
            }
            return false;
        };
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #error {
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,0,0,0.85);
            color: white;
            padding: 10px;
            z-index: 9999;
            font-family: monospace;
            font-size: 12px;
            max-width: 90%;
        }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            z-index: 9998;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="error"></div>
    <div id="status">Loading Azure Maps API...</div>
    <script>
        var statusDiv = document.getElementById('status');
        
        window.onload = function() {
            notify('Initializing POC Azure Map Browser Test...');
            
            if (typeof atlas === 'undefined') {
                statusDiv.innerHTML = 'FAIL: atlas object not found<br>Script failed to load.';
                statusDiv.style.background = 'rgba(255,0,0,0.8)';
                notify('FAIL: atlas object is undefined');
                return;
            }
            
            try {
                notify('Azure Maps API loaded, initializing map...');
                initMap();
                
                setTimeout(function() {
                    if (statusDiv) {
                        statusDiv.style.display = 'none';
                    }
                }, 3000);
            } catch (e) {
                console.error("Exception during map init", e);
                notify("Error during init: " + e.message);
            }
        };
    </script>
</body>
</html>
